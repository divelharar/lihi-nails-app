<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <title>Lihi Nails - זימון תורים</title>
    <meta name="description" content="האומנות שלי, הציפורניים שלך. קביעת תורים אונליין בקליק." />

    <!-- הגדרות במיוחד לווצאפ, פייסבוק ואינסטגרם (Open Graph) -->
    <meta property="og:title" content="Lihi Nails - זימון תורים 💅" />
    <meta property="og:description" content="האומנות שלי, הציפורניים שלך. היכנסי לקביעת תור בקליק! ✨" />
    <meta property="og:url" content="https://lihi-nails-app-8m7r.vercel.app/" />
    <meta property="og:type" content="website" />
    
    <!-- הנה הטריק: הוספתי ?v=999 כדי שווצאפ תחשוב שזו תמונה חדשה לגמרי -->
    <meta property="og:image" content="https://lihi-nails-app-8m7r.vercel.app/LOGO.jpeg?v=999" />

    <!-- הגדרות האפליקציה (PWA) -->
    <meta name="theme-color" content="#db2777" />
    <link rel="manifest" href="/manifest.json" />

    <!-- הגדרות מיוחדות לאייפון (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lihi Nails" />
    <link rel="apple-touch-icon" href="/LOGO.jpeg?v=999" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>

    <div id="root"></div>

</html>
